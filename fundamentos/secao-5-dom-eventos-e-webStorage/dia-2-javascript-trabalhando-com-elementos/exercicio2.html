<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Exercício</title>
    <style>
      section {
        border-color: black;
        border-style: solid;
      }

      .title {
        text-align: center;
      }

      .main-content {
        background-color: yellow;
      }

      .main-content .center-content {
        background-color: red;
        width: 50%;
        margin-left: auto;
        margin-right: auto;
      }

      .main-content .center-content p {
        font-style: italic;
      }

      .main-content .left-content {
        background-color: green;
        width: 60%;
        margin-left: 0;
        margin-right: auto;
      }

      .main-content .left-content .small-image {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-radius: 100%;
      }

      .main-content .right-content {
        background-color: blue;
        width: 60%;
        margin-left: auto;
        margin-right: 0;
      }

      .main-content .description {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <script>
      // COLOQUE SEU CÓDIGO AQUI
      const h1Element = document.createElement('h1');
      h1Element.innerText = 'TrybeTrip - Agência de Viagens';
      document.body.appendChild(h1Element);

      const elementMain = document.createElement('main');
      elementMain.className = 'main-content';
      document.body.appendChild(elementMain);

      const elementSection = document.createElement('section');
      elementSection.className = 'center-content';
      elementMain.appendChild(elementSection);

      const elementP = document.createElement('p');
      elementP.innerText = 'Lorem ipsum dolor sit amet. Et autem tempora et autem voluptate est dolores labore? Et distinctio doloremque in distinctio reiciendis non ratione aliquid ex dolorum enim ab facilis voluptatem. Et odit laborum est numquam voluptatem et eaque perspiciatis a enim officiis At fugiat rerum id asperiores voluptates. Est internos excepturi ad alias corrupti ut iusto omnis aut assumenda velit.';
      elementSection.appendChild(elementP);

      const elementLeftContent = document.createElement('section');
      elementLeftContent.className = 'left-content';
      elementMain.appendChild(elementLeftContent);

      const elementRightContent = document.createElement('section');
      elementRightContent.className = 'right-content';
      elementMain.appendChild(elementRightContent);

      const elementImg = document.createElement('img');
      elementImg.className = 'small-image';
      elementImg.src = 'https://picsum.photos/200';
      elementLeftContent.appendChild(elementImg);

      const elementUl = document.createElement('ul');
      elementRightContent.appendChild(elementUl);

      const arrayNumbers = ['Um', 'Dois', 'Três', 'Quatro', 'Cinco', 'Seis',
        'Sete', 'Oito', 'Nove', 'Dez']

      for(let index = 0; index < arrayNumbers.length; index+= 1){
        const elementLi = document.createElement('li');
        elementLi.innerText = arrayNumbers[index];
        elementUl.appendChild(elementLi);
      };

      for (let index = 0; index < 3; index += 1) {
        const elementH3 = document.createElement('h3');
        elementH3.innerHTML = `Show!! ${index}`;
        elementMain.appendChild(elementH3);
      }

      const title = document.querySelector('h1');
      title.className = 'title';

      const description = document.getElementsByTagName('h3');
      for (index = 0; index < 3; index += 1) {
        description[index].className = 'description'; 
      }

      
      
    </script>
  </body>
</html>
