<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms</title>
</head>
<body>

<form action="" method="get">
  <fieldset>
    <label for="fullName">Nome Completo:</label>
    <input type="text" id="fullName" placeholder="Digite seu nome completo" maxlength="40" minlength="10" required>
    <br>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Digite seu e-mail" maxlength="50" minlength="10" required>
    <br>

    <label for="option1">Opção 1</label>
    <input type="radio" id="option1" name="option1" value="option1" required>

    <label for="option2">Opção 2</label>
    <input type="radio" id="option2" name="option2" value="option2" required>

    <label for="option3">Opção 3</label>
    <input type="radio" id="option3" name="option3" value="option3" required>

    <label for="option4">Opção 4</label>
    <input type="radio" id="option4" name="option4" value="option4" required>
    <br>

    <label for="why">Por que você deveria ser a pessoa desenvolvedora escolhida pelo concurso TrybeTrip</label>
    <br>
    <textarea name="why" id="why" cols="60" rows="10" placeholder="Digite sua resposta vencedora aqui"></textarea>
    <br>

    <label for="date">Qual a melhor data para realizar sua viagem ?</label>
    <input type="date" id="date">
    <br>

    <label for="agree">Gostaria de receber outras incríveis oportunidades oferecidas pela Trybe.</label>
    <input type="checkbox" name="agree" id="agree">
  </fieldset>

  <button type="submit" id="submit-btn">Participar do concurso TrybeTrip</button>
  <button type="button" id="clear-btn">Apagar informações</button>
</form>
  <script src="script.js"></script>
</body>
</html>
